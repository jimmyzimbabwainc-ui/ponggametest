<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="score-board">
            <div class="player-score">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="game-title">PONG</div>
            <div class="computer-score">
                <span class="label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p>Player: Use <strong>Mouse Y</strong> or <strong>Arrow Keys</strong> | Computer: AI Opponent</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
